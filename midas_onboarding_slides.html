<style>
*{box-sizing:border-box;margin:0;padding:0}
.deck{background:#0d0d0d;border-radius:16px;overflow:hidden;font-family:system-ui,sans-serif;min-height:520px;display:flex;flex-direction:column}
.progress-bar{height:3px;background:#222;position:relative}
.progress-fill{height:100%;background:#FFD700;transition:width 0.5s ease}
.slide{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.slide-num{font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.slide-icon{width:52px;height:52px;border-radius:50%;background:#1a1a1a;border:1.5px solid #FFD700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px}
.slide h2{font-size:18px;font-weight:600;color:#fff;margin-bottom:8px;line-height:1.3}
.slide p{font-size:13px;color:#888;line-height:1.7;margin-bottom:16px;max-width:300px}
.phone{background:#1a1a1a;border-radius:20px;border:1.5px solid #333;padding:10px;width:160px;margin:0 auto 16px;position:relative}
.phone-bar{background:#111;border-radius:6px;padding:4px 8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.phone-bar span{font-size:9px;color:#555}
.phone-screen{background:#111;border-radius:12px;padding:10px;min-height:160px;position:relative;overflow:hidden}
.tt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tt-logo{color:#fff;font-size:11px;font-weight:700}
.tt-manage{background:#FFD700;color:#000;font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px}
.menu-item{font-size:10px;color:#aaa;padding:5px 0;border-bottom:0.5px solid #222;text-align:left}
.menu-item.active{color:#FFD700;font-weight:600}
.menu-sub{font-size:9px;color:#666;padding:3px 0 3px 10px;text-align:left}
.menu-sub.active{color:#FFD700}
.highlight-ring{position:absolute;border:2px solid #FFD700;border-radius:6px;pointer-events:none;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.callout-pill{position:absolute;background:#FFD700;color:#000;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.step-pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.pill{background:#1a1a1a;border:0.5px solid #333;color:#888;font-size:11px;padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.pill.done{border-color:#FFD700;color:#FFD700}
.pill.active{background:#FFD700;color:#000;border-color:#FFD700;font-weight:600}
.warn-box{background:#1a1500;border:0.5px solid #664400;border-left:2px solid #FFD700;border-radius:8px;padding:8px 12px;margin:0 auto 14px;max-width:290px;text-align:left}
.warn-box p{font-size:11px;color:#aa8800;line-height:1.5;margin:0}
.warn-box strong{color:#FFD700}
.code-box{background:#111;border:0.5px solid #333;border-radius:8px;padding:8px 12px;font-family:monospace;font-size:11px;color:#FFD700;margin:0 auto 14px;max-width:290px;text-align:left}
.success-ring{width:64px;height:64px;border-radius:50%;border:2px solid #FFD700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:0.5px solid #1a1a1a}
.nav-btn{background:#1a1a1a;border:0.5px solid #333;color:#888;font-size:12px;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all 0.2s;font-family:inherit}
.nav-btn:hover{border-color:#FFD700;color:#FFD700}
.nav-btn.primary{background:#FFD700;color:#000;border-color:#FFD700;font-weight:600}
.nav-btn.primary:hover{background:#e6c200}
.nav-btn:disabled{opacity:0.3;cursor:default}
.dots{display:flex;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:#333;transition:all 0.3s}
.dot.active{background:#FFD700;width:18px;border-radius:3px}
.form-mock{background:#1a1a1a;border-radius:10px;padding:10px;margin-top:4px}
.form-label{font-size:8px;color:#555;margin-bottom:2px;text-align:left}
.form-input{background:#111;border:0.5px solid #333;border-radius:5px;padding:4px 8px;font-size:9px;color:#aaa;width:100%;margin-bottom:6px;font-family:monospace}
.form-input.gold{border-color:#FFD700;color:#FFD700}
.form-btn{background:#FFD700;color:#000;font-size:9px;font-weight:700;padding:6px;border-radius:6px;text-align:center;width:100%;margin-top:4px}
.scope-row{display:flex;gap:3px;flex-wrap:wrap;margin:4px 0}
.scope-tag{background:#0d2a1a;color:#4ade80;font-size:8px;padding:2px 5px;border-radius:10px}
.token-reveal{background:#0d1a0d;border:0.5px solid #4ade80;border-radius:8px;padding:8px 10px;margin-top:6px}
.token-label{font-size:8px;color:#4ade80;font-weight:600;margin-bottom:3px;text-align:left}
.token-val{font-size:8px;color:#4ade80;font-family:monospace;word-break:break-all;text-align:left}
.once-badge{display:inline-block;background:#4a1500;color:#ff6b35;font-size:8px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px}
.anim-type{overflow:hidden;white-space:nowrap;animation:type 1.5s steps(20) forwards}
@keyframes type{from{width:0}to{width:100%}}
</style>

<h2 class="sr-only">Midas onboarding: step-by-step guide to connecting your Tastytrade account</h2>

<div class="deck">
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:14%"></div></div>

  <div class="slide" id="slide-content"></div>

  <div class="nav">
    <button class="nav-btn" id="btn-back" onclick="go(-1)" disabled>Back</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn primary" id="btn-next" onclick="go(1)">Next</button>
  </div>
</div>

<script>
const slides = [
  {
    render: () => `
      <div class="slide-icon">🟡</div>
      <div class="slide-num">Welcome to Midas</div>
      <h2>Let's get you connected</h2>
      <p>This walkthrough connects your Tastytrade account to Midas in about 5 minutes. Your password is never shared — only secure trading access is granted.</p>
      <div class="step-pills">
        <div class="pill active">1 Tastytrade API</div>
        <div class="pill">2 OAuth app</div>
        <div class="pill">3 Credentials</div>
        <div class="pill">4 Connect</div>
      </div>
      <div class="warn-box"><p><strong>Your security:</strong> OAuth gives Midas permission to trade only. You can revoke access from Tastytrade at any time.</p></div>
    `
  },
  {
    render: () => `
      <div class="slide-num">Step 1 of 4</div>
      <h2>Open Tastytrade settings</h2>
      <p>Go to <strong style="color:#FFD700">my.tastytrade.com</strong> and tap <strong style="color:#FFD700">Manage</strong> in the top right.</p>
      <div class="phone">
        <div class="phone-bar"><span>my.tastytrade.com</span><span>↻</span></div>
        <div class="phone-screen">
          <div class="tt-header">
            <div class="tt-logo">🍒 tastytrade</div>
            <div class="tt-manage">Manage ▾</div>
          </div>
          <div class="menu-item">Summary</div>
          <div class="menu-item">My accounts</div>
          <div class="menu-item">My money</div>
          <div class="menu-item active">My profile ▾</div>
          <div class="menu-sub">Investor</div>
          <div class="menu-sub">Personal</div>
          <div class="menu-sub active">→ API</div>
          <div class="highlight-ring" style="top:72px;left:6px;right:6px;height:19px"></div>
          <div class="callout-pill" style="top:94px;left:50%;transform:translateX(-50%)">tap API here</div>
        </div>
      </div>
      <p style="font-size:11px;color:#555">Manage → My profile → API</p>
    `
  },
  {
    render: () => `
      <div class="slide-num">Step 2 of 4</div>
      <h2>Create your OAuth app</h2>
      <p>Tap <strong style="color:#FFD700">OAuth application</strong> then fill in the form exactly as shown.</p>
      <div class="phone">
        <div class="phone-bar"><span>my.tastytrade.com</span><span>↻</span></div>
        <div class="phone-screen">
          <div style="color:#fff;font-size:10px;font-weight:600;margin-bottom:8px">Create Application</div>
          <div class="form-mock">
            <div class="form-label">App name</div>
            <div class="form-input">Midas Bot</div>
            <div class="form-label">Callback URL</div>
            <div class="form-input gold">http://localhost:8000</div>
            <div class="form-label">Scopes — check ALL</div>
            <div class="scope-row">
              <span class="scope-tag">read:account</span>
              <span class="scope-tag">trade</span>
              <span class="scope-tag">read:order</span>
              <span class="scope-tag">write:order</span>
            </div>
            <div class="form-btn">Create Application</div>
          </div>
        </div>
      </div>
      <div class="warn-box"><p>Make sure to check <strong>every scope</strong> — missing one will prevent Midas from trading.</p></div>
    `
  },
  {
    render: () => `
      <div class="slide-num">Step 3a of 4</div>
      <h2>Copy your client secret <span class="once-badge">shown once</span></h2>
      <p>After creating the app your <strong style="color:#FFD700">Client Secret</strong> appears. Copy it immediately — it is never shown again.</p>
      <div class="phone">
        <div class="phone-bar"><span>my.tastytrade.com</span><span>↻</span></div>
        <div class="phone-screen">
          <div style="background:#0d2a1a;border:0.5px solid #4ade80;border-radius:6px;padding:6px;margin-bottom:8px">
            <div style="color:#4ade80;font-size:9px;font-weight:600">App created successfully</div>
          </div>
          <div style="background:#222;border-radius:6px;padding:6px;margin-bottom:6px">
            <div style="color:#555;font-size:8px;margin-bottom:2px">Client ID</div>
            <div style="color:#666;font-size:8px;font-family:monospace">abc-def-123-456</div>
          </div>
          <div style="background:#1a1500;border:1.5px solid #FFD700;border-radius:6px;padding:6px;position:relative">
            <div class="callout-pill" style="top:-10px;right:4px">copy now!</div>
            <div style="color:#FFD700;font-size:8px;font-weight:600;margin-bottom:3px">Client Secret</div>
            <div style="color:#FFD700;font-size:7px;font-family:monospace;word-break:break-all" class="anim-type">xK9mP2qR7vL4nJ8wE3tA6yU1cI5oB0hF</div>
            <div style="color:#664400;font-size:8px;margin-top:4px">Not shown again after this page</div>
          </div>
        </div>
      </div>
      <div class="code-box">Notes app → "Midas Credentials"<br/>Client Secret: [paste here]</div>
    `
  },
  {
    render: () => `
      <div class="slide-num">Step 3b of 4</div>
      <h2>Create your refresh token</h2>
      <p>Go back to your app list, tap <strong style="color:#FFD700">Manage</strong> next to Midas Bot, then tap <strong style="color:#FFD700">Create Grant</strong>.</p>
      <div class="phone">
        <div class="phone-bar"><span>my.tastytrade.com</span><span>↻</span></div>
        <div class="phone-screen">
          <div style="color:#fff;font-size:10px;font-weight:600;margin-bottom:8px">My OAuth Apps</div>
          <div style="background:#222;border-radius:6px;padding:8px;margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div style="color:#fff;font-size:10px;font-weight:600">Midas Bot</div>
              <div style="background:#FFD700;color:#000;font-size:8px;font-weight:700;padding:2px 8px;border-radius:4px">Manage</div>
            </div>
          </div>
          <div style="background:#111;border:1.5px dashed #FFD700;border-radius:6px;padding:8px;text-align:center;margin-bottom:6px">
            <div style="color:#FFD700;font-size:10px;font-weight:600">+ Create Grant</div>
          </div>
          <div class="token-reveal">
            <div class="token-label">Refresh Token generated</div>
            <div class="token-val">eyJ0eXAiOiJKV1QiLCJhbGci...</div>
          </div>
        </div>
      </div>
      <div class="code-box">Notes app → "Midas Credentials"<br/>Refresh Token: [paste here]</div>
    `
  },
  {
    render: () => `
      <div class="slide-num">Step 4 of 4</div>
      <h2>Connect in Alerts Command</h2>
      <p>Open <strong style="color:#FFD700">Alerts Command</strong>, go to the <strong style="color:#FFD700">Midas</strong> section and paste both credentials.</p>
      <div class="phone">
        <div class="phone-bar"><span>Alerts Command</span><span>↻</span></div>
        <div class="phone-screen">
          <div style="color:#FFD700;font-size:11px;font-weight:600;margin-bottom:4px">🟡 Midas</div>
          <div class="form-mock">
            <div class="form-label">Client Secret</div>
            <div class="form-input gold">xK9mP2qR7••••••••</div>
            <div class="form-label">Refresh Token</div>
            <div class="form-input gold">eyJ0eXAiOiJ••••••</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin:6px 0 2px">
              <span style="color:#888;font-size:9px">Auto-trade</span>
              <div style="background:#0d2a1a;border-radius:20px;padding:2px;width:28px;display:flex;justify-content:flex-end">
                <div style="background:#4ade80;width:10px;height:10px;border-radius:50%"></div>
              </div>
            </div>
            <div class="form-label">Limit price</div>
            <div class="form-input">$5.00</div>
            <div class="form-btn">Connect Account</div>
          </div>
        </div>
      </div>
      <div class="warn-box"><p><strong>Never</strong> share credentials in Discord, email, or text. Paste them only here in Alerts Command.</p></div>
    `
  },
  {
    render: () => `
      <div class="success-ring">🟡</div>
      <div class="slide-num">You're live</div>
      <h2>Midas is ready to trade</h2>
      <p>When an alert fires in <strong style="color:#FFD700">#ndx-alerts</strong>, Midas automatically places your NDX 0DTE put credit spread. You'll see confirmation in <strong style="color:#FFD700">#ndx-bot</strong>.</p>
      <div class="step-pills">
        <div class="pill done">1 Tastytrade API</div>
        <div class="pill done">2 OAuth app</div>
        <div class="pill done">3 Credentials</div>
        <div class="pill done">4 Connected</div>
      </div>
      <div class="warn-box"><p><strong>DM Midas anytime:</strong> "change my limit to 4.50" · "turn off auto trading" · "what's NDX at?"</p></div>
    `
  }
];

let cur = 0;

function render() {
  const el = document.getElementById('slide-content');
  el.innerHTML = slides[cur].render();
  el.style.animation = 'none';
  requestAnimationFrame(() => { el.style.animation = ''; el.className = 'slide'; });

  document.getElementById('prog').style.width = ((cur+1)/slides.length*100) + '%';
  document.getElementById('btn-back').disabled = cur === 0;
  document.getElementById('btn-next').textContent = cur === slides.length-1 ? 'Done' : 'Next';
  document.getElementById('btn-next').disabled = false;

  const dots = document.getElementById('dots');
  dots.innerHTML = slides.map((_,i) => `<div class="dot ${i===cur?'active':''}"></div>`).join('');
}

function go(dir) {
  if (dir === 1 && cur === slides.length-1) return;
  cur = Math.max(0, Math.min(slides.length-1, cur+dir));
  render();
}

render();
</script>
